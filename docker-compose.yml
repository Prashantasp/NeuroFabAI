version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: neurofab_postgres
    environment:
      POSTGRES_USER: neurofab
      POSTGRES_PASSWORD: neurofab_password
      POSTGRES_DB: neurofab_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: neurofab_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: neurofab_neo4j
    environment:
      NEO4J_AUTH: neo4j/neurofab_password
    ports:
      - "7474:7474" # HTTP UI
      - "7687:7687" # Bolt port
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
